services:
  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    env_file:
      - ./env/review.common.env
      - /etc/listerine/review.secrets.env
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME}
      DATABASE_URL: sqlite+aiosqlite:///${APP_SQLITE_PATH}
    volumes:
      - ${APP_DATA_DIR}:${APP_DATA_DIR}
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.${TRAEFIK_ROUTER}.rule=Host(`${APP_HOSTNAME}`)
      - traefik.http.routers.${TRAEFIK_ROUTER}.entrypoints=websecure
      - traefik.http.routers.${TRAEFIK_ROUTER}.tls.certresolver=${TRAEFIK_CERTRESOLVER}
      - traefik.http.services.${TRAEFIK_SERVICE}.loadbalancer.server.port=8000
    networks:
      - default
      - traefik

networks:
  traefik:
    name: system_traefik_external
    external: true
