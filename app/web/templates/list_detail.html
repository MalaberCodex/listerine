{% extends "base.html" %}
{% block content %}
<section
  class="list-shell"
  data-list-detail
  data-list-id="{{ list_id }}"
  data-access-token="{{ access_token }}"
>
  <div class="list-hero">
    <div>
      <p class="dashboard-kicker">Shopping list</p>
      <h1 data-list-title>Loading list...</h1>
    </div>
    <a class="back-link" href="/">Back to households</a>
  </div>

  <div class="dashboard-banner dashboard-banner-error" data-list-error hidden></div>
  <div class="dashboard-banner dashboard-banner-success" data-list-success hidden></div>

  <section class="dashboard-card list-focus-card">
    <div class="dashboard-section-heading">
      <div>
        <p class="dashboard-label">Items</p>
        <h2>Shopping now</h2>
      </div>
      <p class="dashboard-helper list-status" data-list-sync-status>Connecting live updates...</p>
    </div>
    <div class="dashboard-empty" data-item-empty hidden>
      <h3>No items yet</h3>
      <p>Tap the plus button to add the first thing you need.</p>
    </div>
    <div class="item-list" data-item-list></div>
  </section>

  <button
    class="floating-add-button"
    type="button"
    aria-expanded="false"
    aria-controls="add-item-panel"
    data-item-form-toggle
  >
    <span aria-hidden="true">+</span>
    <span>Add item</span>
  </button>

  <section class="dashboard-card add-item-panel" id="add-item-panel" data-item-panel hidden>
    <div class="add-item-panel-header">
      <div>
        <p class="dashboard-label">Add fast</p>
        <h2>Add an item</h2>
      </div>
      <button class="add-item-close" type="button" aria-label="Close add item form" data-item-form-close>
        &times;
      </button>
    </div>
    <form class="dashboard-form" data-item-form>
      <label class="dashboard-field">
        <span>Item name</span>
        <input
          type="text"
          name="name"
          placeholder="Milk"
          maxlength="255"
          autocomplete="off"
          required
          data-item-name-input
        />
      </label>
      <div class="item-suggestion-list" data-item-suggestions hidden></div>
      <label class="dashboard-field">
        <span>Category</span>
        <select name="category_id" data-item-category-select>
          <option value="">No category</option>
        </select>
      </label>
      <label class="dashboard-field">
        <span>Quantity</span>
        <input type="text" name="quantity_text" placeholder="2 bottles" maxlength="120" />
      </label>
      <label class="dashboard-field">
        <span>Note</span>
        <input type="text" name="note" placeholder="Low fat if possible" />
      </label>
      <button type="submit">Add item</button>
    </form>
  </section>

  <div class="list-toast" data-list-toast hidden>
    <p data-list-toast-message></p>
    <button type="button" data-list-toast-undo>Undo</button>
    <div class="list-toast-timer" data-list-toast-timer></div>
  </div>

  <section class="dashboard-card item-edit-panel" data-item-edit-panel hidden>
    <div class="add-item-panel-header">
      <div>
        <p class="dashboard-label">Edit item</p>
        <h2 data-item-edit-title>Edit item</h2>
      </div>
      <button class="add-item-close" type="button" aria-label="Close item editor" data-item-edit-close>
        &times;
      </button>
    </div>
    <form class="dashboard-form" data-item-edit-form>
      <label class="dashboard-field">
        <span>Item name</span>
        <input type="text" name="name" maxlength="255" required />
      </label>
      <label class="dashboard-field">
        <span>Category</span>
        <select name="category_id" data-item-edit-category-select>
          <option value="">No category</option>
        </select>
      </label>
      <label class="dashboard-field">
        <span>Quantity</span>
        <input type="text" name="quantity_text" maxlength="120" />
      </label>
      <label class="dashboard-field">
        <span>Note</span>
        <input type="text" name="note" />
      </label>
      <div class="item-edit-actions">
        <button type="submit">Save changes</button>
        <button type="button" class="secondary-button" data-item-edit-delete>Delete item</button>
      </div>
    </form>
  </section>
</section>
{% endblock %}
