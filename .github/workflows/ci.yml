name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.14'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: ./scripts/setup_env.sh
      - run: PYTHONPATH=. black --check .
      - run: PYTHONPATH=. flake8 .
      - run: PYTHONPATH=. pytest

  docker_build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v6
      - name: Compute image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: echo "image=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish commit image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs:
      - test
      - docker_build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Compute release version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          BASE_VERSION=$(python - <<'PY'
          import tomllib
          with open('pyproject.toml', 'rb') as fh:
              print(tomllib.load(fh)['project']['version'])
          PY
          )

          if [ "$REF_NAME" = "main" ]; then
            RELEASE_VERSION="$BASE_VERSION"
          else
            RELEASE_VERSION="$BASE_VERSION-rc.$RUN_NUMBER"
          fi

          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "git_tag=v$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
      - name: Create or update git tag
        env:
          GIT_TAG: ${{ steps.version.outputs.git_tag }}
        run: |
          if git rev-parse "$GIT_TAG" >/dev/null 2>&1; then
            echo "Tag $GIT_TAG already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$GIT_TAG" "$GITHUB_SHA"
            git push origin "$GIT_TAG"
          fi
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Promote tested image to release tag
        env:
          IMAGE: ${{ needs.docker_build.outputs.image }}
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:$RELEASE_VERSION" \
            "$IMAGE:sha-$GITHUB_SHA"
