name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.14'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  python_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: ./scripts/setup_env.sh
      - run: PYTHONPATH=. black --check .
      - run: PYTHONPATH=. flake8 .
      - run: PYTHONPATH=. pytest

  swift_test:
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    steps:
      - uses: actions/checkout@v4
      - name: Run Swift package tests with coverage gate
        run: cd ios/ListerineIOS && ./Scripts/check_coverage.sh

  version_change:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version_change.outputs.changed }}
      release_version: ${{ steps.version.outputs.release_version }}
      git_tag: ${{ steps.version.outputs.git_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect VERSION changes on main
        id: version_change
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" != "push" ] || [ "$REF_NAME" != "main" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$BEFORE_SHA" ] && git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            if git diff --quiet "$BEFORE_SHA" "$GITHUB_SHA" -- VERSION; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Read release version from VERSION
        id: version
        run: |
          RELEASE_VERSION=$(tr -d '[:space:]' < VERSION)
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "git_tag=v$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

  docker_build:
    runs-on: ubuntu-latest
    needs:
      - python_test
      - swift_test
      - version_change
    if: needs.version_change.outputs.changed == 'true'
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v6
      - name: Compute image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: echo "image=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:sha-${{ github.sha }}
            ${{ steps.image.outputs.image }}:${{ needs.version_change.outputs.release_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs:
      - docker_build
      - version_change
    if: needs.version_change.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create git tag from VERSION
        env:
          GIT_TAG: ${{ needs.version_change.outputs.git_tag }}
        run: |
          if git rev-parse "$GIT_TAG" >/dev/null 2>&1; then
            echo "Tag $GIT_TAG already exists. Did VERSION get bumped for this main-branch release?"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$GIT_TAG" "$GITHUB_SHA"
          git push origin "$GIT_TAG"
