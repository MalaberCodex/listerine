name: CI

on:
  push:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.14'
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  python_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: ./scripts/setup_env.sh
      - run: PYTHONPATH=. black --check .
      - run: PYTHONPATH=. flake8 .
      - run: PYTHONPATH=. pytest

  javascript_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run test:js

  browser_e2e:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: '3.14'
      NODE_VERSION: '24'
      DATABASE_URL: sqlite+aiosqlite:///./tmp-ci-ui-e2e.db
      SEED_DATA_PATH: app/fixtures/review_seed.json
      WEBAUTHN_RP_ID: localhost
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: ./scripts/setup_env.sh
      - run: npm install --no-save playwright
      - run: npx playwright install --with-deps chromium
      - name: Start review app
        run: |
          PYTHONPATH=. uvicorn app.main:app --host 127.0.0.1 --port 8000 > ui-e2e-server.log 2>&1 &
          echo $! > ui-e2e-server.pid
      - name: Wait for review app
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Review app never became healthy" >&2
          cat ui-e2e-server.log >&2
          exit 1
      - name: Run browser ui e2e
        run: PREVIEW_BASE_URL=http://localhost:8000 node scripts/run_ui_e2e.mjs
      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: browser-ui-e2e
          retention-days: 2
          path: |
            e2e-artifacts/ui-e2e
            ui-e2e-server.log
      - name: Add browser summary
        if: always()
        run: |
          if [ -f e2e-artifacts/ui-e2e/summary.md ]; then
            cat e2e-artifacts/ui-e2e/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Stop review app
        if: always()
        run: |
          if [ -f ui-e2e-server.pid ]; then
            kill "$(cat ui-e2e-server.pid)" || true
          fi

  swift_test:
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    steps:
      - uses: actions/checkout@v4
      - name: Run Swift package tests with coverage gate
        run: cd ios/ListerineIOS && ./Scripts/check_coverage.sh

  version:
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.version.outputs.base_version }}
      release_version: ${{ steps.version.outputs.release_version }}
      git_tag: ${{ steps.version.outputs.git_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Compute release version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess

          def tag_exists(tag: str) -> bool:
              return subprocess.run(
                  ["git", "rev-parse", "--verify", "--quiet", tag],
                  check=False,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              ).returncode == 0

          def latest_stable_version() -> str:
              stable_pattern = re.compile(r"^v(\d+)\.(\d+)\.(\d+)$")
              tags = subprocess.run(
                  ["git", "tag", "--list", "v*"],
                  check=True,
                  capture_output=True,
                  text=True,
              ).stdout.splitlines()
              versions = [
                  tuple(map(int, match.groups()))
                  for tag in tags
                  if (match := stable_pattern.fullmatch(tag))
              ]
              if not versions:
                  return "0.1.0"
              major, minor, patch = max(versions)
              return f"{major}.{minor}.{patch}"

          def next_stable_version(version: str) -> str:
              major, minor, patch = map(int, version.split("."))
              patch += 1
              candidate = f"{major}.{minor}.{patch}"
              while tag_exists(f"v{candidate}"):
                  patch += 1
                  candidate = f"{major}.{minor}.{patch}"
              return candidate

          def next_rc_version(version: str, run_number: int) -> str:
              rc_number = run_number
              candidate = f"{version}-rc.{rc_number}"
              while tag_exists(f"v{candidate}"):
                  rc_number += 1
                  candidate = f"{version}-rc.{rc_number}"
              return candidate

          base_version = next_stable_version(latest_stable_version())
          ref_name = os.environ["REF_NAME"]
          run_number = int(os.environ["RUN_NUMBER"])

          if ref_name == "main":
              release_version = base_version
          else:
              release_version = next_rc_version(base_version, run_number)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"base_version={base_version}\n")
              fh.write(f"release_version={release_version}\n")
              fh.write(f"git_tag=v{release_version}\n")
          PY

  docker_build:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs:
      - python_test
      - javascript_test
      - browser_e2e
      - swift_test
      - version
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      primary_tag: ${{ steps.tags.outputs.primary_tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Checkout PR head commit for preview images
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin "${{ github.event.pull_request.head.sha }}"
          git checkout --detach "${{ github.event.pull_request.head.sha }}"
      - name: Compute image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: echo "image=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Compute image tags
        id: tags
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          EVENT_NAME: ${{ github.event_name }}
          PUSH_SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            PRIMARY_TAG="sha-$PR_HEAD_SHA"
            {
              echo "primary_tag=$PRIMARY_TAG"
              echo "tags<<EOF"
              echo "$IMAGE:$PRIMARY_TAG"
              echo "$IMAGE:pr-$PR_NUMBER-${PR_HEAD_SHA:0:7}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            PRIMARY_TAG="sha-$PUSH_SHA"
            {
              echo "primary_tag=$PRIMARY_TAG"
              echo "tags<<EOF"
              echo "$IMAGE:$PRIMARY_TAG"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish commit image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            LISTERINE_VERSION=${{ needs.version.outputs.release_version }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Add docker build summary
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          IMAGE_TAG: ${{ steps.tags.outputs.primary_tag }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          docker buildx imagetools inspect "$IMAGE:$IMAGE_TAG" > docker-image-inspect.txt
          {
            echo "## Docker image publish summary"
            echo
            printf 'Published image: `%s`\n' "$IMAGE:$IMAGE_TAG"
            printf 'Manifest digest: `%s`\n' "$IMAGE_DIGEST"
            echo
            echo "### Published platforms"
            awk '/Platform:/ { printf "- `%s`\n", $2 }' docker-image-inspect.txt
            echo
            echo "### Inspection output"
            echo '```text'
            cat docker-image-inspect.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Wake webhooker review deployment
        if: github.event_name == 'pull_request'
        env:
          WAKE_URL: ${{ vars.WEBHOOKER_REVIEW_WAKE_URL }}
          WAKE_SECRET: ${{ secrets.WEBHOOKER_WEBHOOK_SECRET }}
          EVENT_ACTION: ${{ github.event.action }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
          DELIVERY_ID: ci-review-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          python - <<'PY'
          import hashlib
          import hmac
          import json
          import os
          import urllib.request

          if not os.environ["WAKE_URL"] or not os.environ["WAKE_SECRET"]:
              print("Skipping review wake: WEBHOOKER_REVIEW_WAKE_URL or WEBHOOKER_WEBHOOK_SECRET is not configured.")
              raise SystemExit(0)

          owner, repo = os.environ["REPOSITORY"].split("/", 1)
          payload = {
              "action": os.environ["EVENT_ACTION"],
              "number": int(os.environ["PR_NUMBER"]),
              "pull_request": {
                  "number": int(os.environ["PR_NUMBER"]),
                  "head": {"sha": os.environ["PR_HEAD_SHA"]},
              },
              "repository": {
                  "name": repo,
                  "full_name": os.environ["REPOSITORY"],
                  "owner": {"login": owner},
              },
          }
          body = json.dumps(payload, separators=(",", ":"), sort_keys=True).encode("utf-8")
          signature = "sha256=" + hmac.new(
              os.environ["WAKE_SECRET"].encode("utf-8"),
              body,
              hashlib.sha256,
          ).hexdigest()
          request = urllib.request.Request(
              os.environ["WAKE_URL"],
              data=body,
              method="POST",
              headers={
                  "Content-Type": "application/json",
                  "X-GitHub-Event": "pull_request",
                  "X-GitHub-Delivery": os.environ["DELIVERY_ID"],
                  "X-Hub-Signature-256": signature,
              },
          )
          with urllib.request.urlopen(request) as response:
              print(f"review wake status={response.status}")
          PY
      - name: Wake webhooker production deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          WAKE_URL: ${{ vars.WEBHOOKER_PRODUCTION_WAKE_URL }}
          WAKE_SECRET: ${{ secrets.WEBHOOKER_WEBHOOK_SECRET }}
          PUSH_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          DELIVERY_ID: ci-production-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          python - <<'PY'
          import hashlib
          import hmac
          import json
          import os
          import urllib.request

          if not os.environ["WAKE_URL"] or not os.environ["WAKE_SECRET"]:
              print("Skipping production wake: WEBHOOKER_PRODUCTION_WAKE_URL or WEBHOOKER_WEBHOOK_SECRET is not configured.")
              raise SystemExit(0)

          owner, repo = os.environ["REPOSITORY"].split("/", 1)
          payload = {
              "ref": f"refs/heads/{os.environ['REF_NAME']}",
              "after": os.environ["PUSH_SHA"],
              "repository": {
                  "name": repo,
                  "full_name": os.environ["REPOSITORY"],
                  "owner": {"login": owner},
              },
          }
          body = json.dumps(payload, separators=(",", ":"), sort_keys=True).encode("utf-8")
          signature = "sha256=" + hmac.new(
              os.environ["WAKE_SECRET"].encode("utf-8"),
              body,
              hashlib.sha256,
          ).hexdigest()
          request = urllib.request.Request(
              os.environ["WAKE_URL"],
              data=body,
              method="POST",
              headers={
                  "Content-Type": "application/json",
                  "X-GitHub-Event": "push",
                  "X-GitHub-Delivery": os.environ["DELIVERY_ID"],
                  "X-Hub-Signature-256": signature,
              },
          )
          with urllib.request.urlopen(request) as response:
              print(f"production wake status={response.status}")
          PY

  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs:
      - python_test
      - javascript_test
      - browser_e2e
      - swift_test
      - docker_build
      - version
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create or update git tag
        env:
          GIT_TAG: ${{ needs.version.outputs.git_tag }}
        run: |
          if git rev-parse "$GIT_TAG" >/dev/null 2>&1; then
            echo "Tag $GIT_TAG already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$GIT_TAG" "$GITHUB_SHA"
            git push origin "$GIT_TAG"
          fi
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Promote tested image to release tag
        env:
          IMAGE: ${{ needs.docker_build.outputs.image }}
          COMMIT_DIGEST: ${{ needs.docker_build.outputs.digest }}
          RELEASE_VERSION: ${{ needs.version.outputs.release_version }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:$RELEASE_VERSION" \
            "$IMAGE:sha-$GITHUB_SHA"
      - name: Add release image summary
        env:
          IMAGE: ${{ needs.docker_build.outputs.image }}
          COMMIT_DIGEST: ${{ needs.docker_build.outputs.digest }}
          RELEASE_VERSION: ${{ needs.version.outputs.release_version }}
        run: |
          docker buildx imagetools inspect "$IMAGE:$RELEASE_VERSION" > docker-release-inspect.txt
          {
            echo "## Docker release summary"
            echo
            printf 'Commit image: `%s`\n' "$IMAGE:sha-$GITHUB_SHA"
            printf 'Commit manifest digest: `%s`\n' "$COMMIT_DIGEST"
            printf 'Release tag: `%s`\n' "$IMAGE:$RELEASE_VERSION"
            echo
            echo "### Published platforms"
            awk '/Platform:/ { printf "- `%s`\n", $2 }' docker-release-inspect.txt
            echo
            echo "### Inspection output"
            echo '```text'
            cat docker-release-inspect.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
