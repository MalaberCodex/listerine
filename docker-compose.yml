services:
  app:
    image: ${LISTERINE_IMAGE:-ghcr.io/malaber/listerine:0.1.2}
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in your .env file}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/listerine.db}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      UVICORN_FORWARDED_ALLOW_IPS: ${UVICORN_FORWARDED_ALLOW_IPS:-127.0.0.1}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
